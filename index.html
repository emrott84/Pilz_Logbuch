<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilz Logbuch v4.7</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #3b5940; --accent: #4CAF50; --bg: #f5f0e8; --white: #ffffff; --danger: #d32f2f; }
        body { margin: 0; padding: 0; background: var(--bg); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #app-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        
        #map { height: 50vh; min-height: 300px; width: 100%; z-index: 1; flex-shrink: 0; }
        
        /* Der Zentrier-Button: Jetzt sicher positioniert */
       .gps-fab {
    position: absolute;
    bottom: 50px; /* Hoch genug über dem Leaflet-Logo */
    right: 10px;
    z-index: 1000;
    background: white;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    cursor: pointer;
    font-size: 20px;
    border: 1px solid #ccc;
}


        #ui-content { padding: 12px; background: var(--bg); flex: 1; }
        .card { background: var(--white); padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        input[type="text"], textarea { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; }
        textarea { height: 60px; resize: none; }

        .action-row { display: flex; gap: 8px; align-items: center; margin-top: 5px; }
        .icon-btn { flex: 0 0 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: #607D8B; border-radius: 8px; border: none; color: white; cursor: pointer; }
        .save-btn { flex: 1; height: 50px; background: var(--accent); color: white; font-weight: bold; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }

        .search-bar-container { position: sticky; top: 0; background: var(--bg); padding: 8px 0; z-index: 10; display: flex; gap: 8px; }
        #mushroom-list { list-style: none; padding: 0; margin: 0; }
        .list-item { background: var(--white); display: flex; align-items: center; padding: 8px; margin-bottom: 6px; border-radius: 10px; cursor: pointer; border-left: 5px solid var(--primary); }
        .list-item img { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; margin-right: 12px; }

        .full-modal { position: fixed; inset: 0; background: var(--white); z-index: 2000; display: none; flex-direction: column; }
        .modal-header { background: var(--primary); color: white; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .tab-content { padding: 12px; overflow-y: auto; flex: 1; }

        .wiki-link { display: inline-flex; align-items: center; text-decoration: none; background: #e1e8e1; color: var(--primary); padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; margin-left: 10px; border: 1px solid #c5d1c5; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map">
        <div class="gps-fab" onclick="locateUser()" title="Standort zentrieren">🎯</div>
    </div>

    <div id="ui-content">
        <div class="card">
            <input type="text" id="input-name" placeholder="Name (z.B. Steinpilz)">
            <input type="text" id="input-location" placeholder="Ort (z.B. Mooshang)">
            <textarea id="input-info" placeholder="Habitat, Begleitbäume..."></textarea>
            
            <div class="action-row">
                <button class="icon-btn" onclick="document.getElementById('camera-input').click()">📷</button>
                <input type="file" id="camera-input" class="hidden" accept="image/*" capture="environment" onchange="handleImage(this)">
                
                <button class="icon-btn" onclick="document.getElementById('gallery-input').click()">🖼️</button>
                <input type="file" id="gallery-input" class="hidden" accept="image/*" onchange="handleImage(this)">
                
                <button id="main-save-btn" class="save-btn" onclick="saveEntry()">📍 Fund mit GPS speichern</button>
            </div>

            <div id="preview-container" style="margin-top: 8px; display:none;">
                <small style="color:var(--accent)">✔ Foto bereit</small>
            </div>
        </div>

        <div class="search-bar-container">
            <input type="text" id="search-input" placeholder="🔍 Suchen..." onkeyup="updateUI()" style="margin:0; flex:1;">
        </div>

        <ul id="mushroom-list"></ul>
        
        <div style="text-align:center; padding: 20px 0;">
            <button style="background:none; border:none; color:#999; font-size:0.7rem;" onclick="exportData()">Backup</button>
            <button style="background:none; border:none; color:#999; font-size:0.7rem; margin-left:10px;" onclick="document.getElementById('import-file').click()">Import</button>
            <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(this)">
        </div>
    </div>
</div>

<div id="detail-modal" class="full-modal">
    <div class="modal-header"><h3 id="modal-title" style="margin:0;">Details</h3><button onclick="toggleModal('detail-modal')">✕</button></div>
    <div id="detail-history" class="tab-content"></div>
    <div id="detail-photos" class="tab-content hidden"><div id="image-grid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:6px;"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let db, entries = [], markersOnMap = [], currentImage = null;

    async function openDB() {
        return new Promise(res => {
            const req = indexedDB.open('PilzLogDB_v4', 1);
            req.onsuccess = e => { db = e.target.result; res(); };
            req.onupgradeneeded = e => { 
                const d = e.target.result; 
                d.createObjectStore('entries', {keyPath:'id'}); 
                d.createObjectStore('photos', {keyPath:'id'}); 
            };
        });
    }

    const idb = {
        getAll: s => new Promise(r => { const req = db.transaction(s).objectStore(s).getAll(); req.onsuccess = () => r(req.result); }),
        get: (s, id) => new Promise(r => { const req = db.transaction(s).objectStore(s).get(id); req.onsuccess = () => r(req.result); }),
        put: (s, o) => new Promise(r => { const req = db.transaction(s, 'readwrite').objectStore(s).put(o); req.onsuccess = () => r(); }),
        del: (s, id) => new Promise(r => { const req = db.transaction(s, 'readwrite').objectStore(s).delete(id); req.onsuccess = () => r(); })
    };

    // --- MAP ---
    let map = L.map('map').setView([50.297, 8.266], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.de/tiles/osmde/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

    function locateUser() {
    const btn = document.querySelector('.gps-fab');
    btn.innerText = "⌛"; // Visuelles Feedback

    navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        
        // Karte fliegen und Button zurücksetzen
        map.flyTo([lat, lng], 17);
        btn.innerText = "🎯";
        
        // Optional: Kleiner blauer Punkt für den aktuellen Standort
        if (window.userMarker) {
            window.userMarker.setLatLng([lat, lng]);
        } else {
            window.userMarker = L.circleMarker([lat, lng], {
                color: '#3b5940',
                fillColor: '#4CAF50',
                fillOpacity: 0.8,
                radius: 8
            }).addTo(map).bindPopup("Du bist hier");
        }
    }, (err) => {
        btn.innerText = "🎯";
        alert("Standort konnte nicht ermittelt werden: " + err.message);
    }, {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0 // WICHTIG: Verhindert, dass er alte (gecashte) Daten nutzt
    });
}

    // --- LOGIC ---
    function handleImage(input) {
        if (input.files[0]) {
            const r = new FileReader();
            r.onload = e => { currentImage = e.target.result; document.getElementById('preview-container').style.display = 'block'; };
            r.readAsDataURL(input.files[0]);
        }
    }

    async function saveEntry() {
        const name = document.getElementById('input-name').value;
        const loc = document.getElementById('input-location').value;
        const info = document.getElementById('input-info').value;
        const btn = document.getElementById('main-save-btn');

        if(!name) { alert("Bitte Namen eingeben"); return; }
        
        btn.innerText = "⌛ Ort wird ermittelt...";
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const photoId = currentImage ? Date.now().toString() + '_p' : null;
            let thumb = 'icon-192.png';

            if (currentImage) {
                await idb.put('photos', { id: photoId, full: currentImage });
                thumb = await createThumb(currentImage);
            }

            const newEntry = {
                id: Date.now().toString(),
                name: name,
                location: loc || 'Wald',
                info: info,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                ts: Date.now(),
                photoId: photoId,
                thumb: thumb
            };

            await idb.put('entries', newEntry);
            
            // Reset
            document.getElementById('input-name').value = '';
            document.getElementById('input-location').value = '';
            document.getElementById('input-info').value = '';
            currentImage = null;
            document.getElementById('preview-container').style.display = 'none';
            btn.innerText = "📍 Fund mit GPS speichern";
            btn.disabled = false;

            entries = await idb.getAll('entries');
            updateUI();
            alert("Erfolgreich gespeichert!");
        }, (err) => {
            btn.innerText = "📍 Fund mit GPS speichern";
            btn.disabled = false;
            alert("GPS Fehler: " + err.message);
        }, {enableHighAccuracy: true, timeout: 8000});
    }

    async function createThumb(base64) {
        return new Promise(r => {
            const img = new Image(); img.src = base64;
            img.onload = () => {
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                c.width = 100; c.height = 100; ctx.drawImage(img,0,0,100,100); r(c.toDataURL('image/jpeg', 0.6));
            };
        });
    }

    function updateUI() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = entries.filter(e => e.name.toLowerCase().includes(query));

        markersOnMap.forEach(m => map.removeLayer(m));
        markersOnMap = filtered.map(e => L.marker([e.lat, e.lng]).addTo(map).bindPopup(`<b>${e.name}</b>`));

        const listEl = document.getElementById('mushroom-list');
        listEl.innerHTML = '';
        const groups = filtered.reduce((acc, e) => { if(!acc[e.name]) acc[e.name]=[]; acc[e.name].push(e); return acc; }, {});
        
        Object.keys(groups).sort().forEach(name => {
            const g = groups[name];
            const li = document.createElement('li'); li.className = 'list-item';
            li.innerHTML = `<img src="${g[g.length-1].thumb}"> <div><strong>${name}</strong><br><small>${g.length} Funde</small></div>`;
            li.onclick = () => openDetail(name, g);
            listEl.appendChild(li);
        });
    }

    function openWiki(name) {
        window.open(`https://www.google.com/search?q=site:123pilzsuche.de+${encodeURIComponent(name)}`, '_blank');
    }

    async function openDetail(name, group) {
        const titleEl = document.getElementById('modal-title');
        titleEl.innerHTML = `${name} <a href="#" class="wiki-link" onclick="openWiki('${name}'); return false;">📖 Wiki</a>`;
        
        const hist = document.getElementById('detail-history');
        hist.innerHTML = '';

        group.sort((a,b) => b.ts - a.ts).forEach(async e => {
            const div = document.createElement('div');
            div.style.padding = "10px"; div.style.borderBottom = "1px solid #eee";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <strong>📍 ${e.location}</strong>
                    <small>${new Date(e.ts).toLocaleDateString()}</small>
                </div>
                <div style="font-size:0.8rem; color:#666; margin-top:4px;">${e.info || ''}</div>
                <button style="margin-top:5px; font-size:0.7rem;" onclick="jumpTo(${e.lat}, ${e.lng})">Auf Karte zeigen</button>
            `;
            hist.appendChild(div);
        });
        toggleModal('detail-modal');
    }

    function toggleModal(id) { 
        const m = document.getElementById(id); 
        m.style.display = (m.style.display==='flex') ? 'none' : 'flex'; 
    }

    function jumpTo(lat, lng) { 
        toggleModal('detail-modal'); 
        map.flyTo([lat, lng], 17); 
    }

    async function exportData() {
        const e = await idb.getAll('entries'), p = await idb.getAll('photos');
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify({entries:e, photos:p})]));
        a.download = `pilz_backup.json`; a.click();
    }

    async function importData(i) {
        const r = new FileReader();
        r.onload = async e => {
            const d = JSON.parse(e.target.result);
            for(let x of d.entries) await idb.put('entries', x);
            for(let y of d.photos) await idb.put('photos', y);
            location.reload();
        };
        r.readAsText(i.files[0]);
    }

    window.onload = async () => { 
        await openDB(); 
        entries = await idb.getAll('entries'); 
        updateUI(); 
    };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
</script>
</body>
</html>
